<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Studio - 創意圖片分享平台</title>
  <!-- SEO Meta Tags -->
  <meta name="description" content="Photo Studio 是一個連接 Google Drive 與 Google Apps Script 的雲端相簿與留言平台。輕鬆上傳圖片、寫下心情、並與大家即時留言互動。">
  <meta name="author" content="Antigravity Pair">
  
  <!-- Styling and Fonts -->
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <!-- Premium Sticky Header -->
  <header>
    <div class="header-container">
      <a href="#" class="logo" onclick="switchTab('feed')">
        <i class="fas fa-camera-retro"></i>
        <span>Photo Studio</span>
      </a>
      
      <!-- Navigation Menu -->
      <nav>
        <button class="nav-tab active" data-view="feed" id="nav-feed-tab">
          <i class="fas fa-images"></i> 探索動態
        </button>
        <button class="nav-tab" data-view="upload" id="nav-upload-tab">
          <i class="fas fa-cloud-upload-alt"></i> 發布分享
        </button>
      </nav>
      
      <!-- Header Actions -->
      <div class="user-controls">
      </div>
    </div>
  </header>

  <!-- Main Content Area -->
  <main>
    

    <!-- VIEW 1: Feed/Posts View -->
    <section class="view-section active" id="feed-view">
      <div class="feed-header">
        <h1>探索社群動態</h1>
        <div style="display: flex; align-items: center; gap: 0.75rem;">
          <div class="layout-selector">
            <span class="layout-label">排版：</span>
            <button class="layout-btn active" data-cols="2" title="大圖排版 (2行)">
              <div class="grid-icon icon-cols-2">
                <span></span><span></span>
              </div>
            </button>
            <button class="layout-btn" data-cols="4" title="中圖排版 (4行)">
              <div class="grid-icon icon-cols-4">
                <span></span><span></span><span></span><span></span>
              </div>
            </button>
            <button class="layout-btn" data-cols="6" title="小圖排版 (6行)">
              <div class="grid-icon icon-cols-6">
                <span></span><span></span><span></span><span></span><span></span><span></span>
              </div>
            </button>
          </div>
          <button class="btn btn-outline btn-icon" id="refresh-feed-btn" title="重新整理">
            <i class="fas fa-sync-alt"></i>
          </button>
        </div>
      </div>
      
      <!-- Search and Filter Bar -->
      <div class="search-bar-container">
        <i class="fas fa-search search-icon"></i>
        <input type="text" id="search-input" class="search-input" placeholder="搜尋內容、#標籤 或 @名字...">
        <button class="clear-search-btn" id="clear-search-btn" title="清除搜尋" style="display: none;">
          <i class="fas fa-times"></i>
        </button>
      </div>
      
      <!-- Grid container for post cards -->
      <div class="feed-grid" id="feed-grid">
        <!-- JS will dynamically render card elements or skeleton loaders here -->
      </div>
    </section>

    <!-- VIEW 2: Upload Post View -->
    <section class="view-section" id="upload-view">
      
      <!-- Accessible upload wrapper -->
      <div class="upload-container" id="upload-form-wrapper">
        <h2 class="upload-title">分享精彩瞬間</h2>
        <p class="upload-subtitle">上傳圖片並寫下您的心情故事，將其保存於 Google Drive 中</p>
        
        <form id="upload-form">
          <!-- Dropzone and File Select -->
          <div class="dropzone-container" id="dropzone">
            <input type="file" id="file-input" class="file-input" accept="image/*">
            <div id="upload-placeholder">
              <i class="fas fa-cloud-upload-alt dropzone-icon"></i>
              <p class="dropzone-text">拖曳圖片到此處、點擊選擇檔案，或使用 Ctrl + V 貼上圖片</p>
              <p class="dropzone-hint">支援 JPG, PNG, GIF 格式</p>
            </div>
            
            <div class="preview-container" id="preview-container">
              <img src="" alt="Image preview" class="preview-image" id="preview-image">
              <button type="button" class="remove-preview-btn" id="remove-preview-btn" title="移除圖片">
                <i class="fas fa-times"></i>
              </button>
            </div>
          </div>
          
          <!-- Image Title -->
          <div class="form-group" style="margin-bottom: 1.25rem;">
            <label for="upload-title">文章標題：</label>
            <input type="text" id="upload-title" class="input-control" placeholder="輸入文章標題..." required>
          </div>
          
          <!-- Image Description -->
          <div class="form-group" style="margin-bottom: 1.5rem;">
            <label for="upload-description">圖片說明與心情：（可使用 #標籤 例如 #峻...，方便快速篩選搜尋）</label>
            <textarea id="upload-description" class="input-control" rows="4" placeholder="寫點什麼吧..." required style="resize: vertical; min-height: 100px;"></textarea>
          </div>
          
          <!-- Loading Progress Alert -->
          <div style="font-size: 0.9rem; color: var(--primary); margin-bottom: 1rem; display: none; text-align: center;" id="upload-progress">
            <i class="fas fa-spinner fa-spin"></i> 正在處理圖片並上傳...
          </div>
          
          <button type="submit" class="btn btn-primary" id="upload-btn" style="width: 100%; padding: 0.8rem;">
            <i class="fas fa-paper-plane"></i> 發布動態
          </button>
        </form>
      </div>
      

      
    </section>

  </main>

  <!-- Sticky Footer -->
  <footer class="app-footer">
    <p>© 2026 Photo Studio. Powered by Google Apps Script & Google Drive.</p>
  </footer>

  <!-- Toast Notification Container -->
  <div class="toast-container" id="toast-container"></div>



  <!-- App Script Logic -->
  <script src="app.js"></script>
</body>
</html>
